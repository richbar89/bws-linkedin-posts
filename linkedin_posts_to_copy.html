<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LinkedIn Posts Generator - Bid Writing Service</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                padding: 20px;
            }

            .container {
                max-width: 1200px;
                margin: 0 auto;
            }

            .header {
                background: white;
                padding: 30px;
                border-radius: 15px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                margin-bottom: 30px;
                text-align: center;
            }
            .header h1 {
                color: #333;
                font-size: 32px;
                margin-bottom: 8px;
            }
            .header p {
                color: #666;
                font-size: 16px;
            }

            .controls {
                background: white;
                padding: 25px;
                border-radius: 15px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                margin-bottom: 30px;
            }
            .control-group {
                display: flex;
                gap: 20px;
                align-items: center;
                flex-wrap: wrap;
            }
            .control-group label {
                font-weight: 600;
                color: #333;
                font-size: 16px;
            }
            .control-group select {
                flex: 1;
                min-width: 250px;
                padding: 12px 20px;
                border: 2px solid #e0e0e0;
                border-radius: 8px;
                font-size: 16px;
                background: white;
                cursor: pointer;
                transition: border-color 0.3s;
            }
            .control-group select:hover,
            .control-group select:focus {
                border-color: #667eea;
                outline: none;
            }

            .stats {
                display: flex;
                gap: 20px;
                margin-top: 15px;
                flex-wrap: wrap;
            }
            .stat {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                text-align: center;
                flex: 1;
                min-width: 150px;
            }
            .stat-number {
                font-size: 32px;
                font-weight: bold;
                display: block;
            }
            .stat-label {
                font-size: 14px;
                opacity: 0.9;
                margin-top: 5px;
            }

            .loading,
            .empty-state {
                background: white;
                padding: 60px;
                border-radius: 15px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                text-align: center;
                display: none;
            }
            .loading.show,
            .empty-state.show {
                display: block;
            }
            .spinner {
                border: 4px solid #f3f3f3;
                border-top: 4px solid #667eea;
                border-radius: 50%;
                width: 50px;
                height: 50px;
                animation: spin 1s linear infinite;
                margin: 0 auto 20px;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .empty-state h3 {
                color: #333;
                font-size: 24px;
                margin-bottom: 10px;
            }
            .empty-state p {
                color: #666;
                font-size: 16px;
            }

            .posts-container {
                display: none;
            }
            .posts-container.show {
                display: block;
            }

            .post-card {
                background: white;
                border-radius: 15px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                margin-bottom: 25px;
                overflow: hidden;
                transition:
                    transform 0.3s,
                    box-shadow 0.3s;
            }
            .post-card:hover {
                transform: translateY(-3px);
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            }

            .post-header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 18px 25px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .post-header-left {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .alert-badge {
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.5px;
                padding: 4px 10px;
                border-radius: 20px;
                text-transform: uppercase;
            }
            .alert-badge.new {
                background: #f59e0b;
                color: #fff;
            }
            .alert-badge.incoming {
                background: #10b981;
                color: #fff;
            }
            .post-sector {
                font-size: 16px;
                font-weight: 600;
            }
            .post-number {
                font-size: 13px;
                opacity: 0.8;
            }

            .post-body {
                padding: 25px;
            }
            .post-text {
                font-family: "Segoe UI", Arial, sans-serif;
                font-size: 15px;
                line-height: 1.85;
                color: #1a1a2e;
                white-space: pre-wrap;
                background: #f8f9fa;
                padding: 22px 24px;
                border-radius: 10px;
                border-left: 4px solid #667eea;
                margin-bottom: 18px;
            }

            .post-actions {
                display: flex;
                gap: 12px;
            }
            .btn {
                padding: 12px 22px;
                border: none;
                border-radius: 8px;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .btn-copy {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                flex: 1;
                justify-content: center;
            }
            .btn-copy:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            }
            .btn-copy.copied {
                background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            }
            .btn-link {
                background: #f3f4f6;
                color: #667eea;
            }
            .btn-link:hover {
                background: #e5e7eb;
            }

            .team-pill {
                margin-top: 14px;
                padding: 10px 14px;
                background: #f0f9ff;
                border-radius: 6px;
                font-size: 13px;
                color: #0369a1;
            }

            .back-link {
                display: inline-block;
                background: white;
                color: #667eea;
                padding: 12px 24px;
                border-radius: 8px;
                text-decoration: none;
                font-weight: 600;
                margin-bottom: 20px;
                transition: all 0.3s;
            }
            .back-link:hover {
                background: #f3f4f6;
                transform: translateY(-2px);
            }

            @media (max-width: 768px) {
                .header h1 {
                    font-size: 24px;
                }
                .control-group {
                    flex-direction: column;
                    align-items: stretch;
                }
                .control-group select {
                    min-width: 100%;
                }
                .stats {
                    flex-direction: column;
                }
                .post-header {
                    flex-direction: column;
                    gap: 8px;
                    align-items: flex-start;
                }
                .post-actions {
                    flex-direction: column;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <a href="/" class="back-link">← Back to Tender Scanner</a>

            <div class="header">
                <h1>📱 LinkedIn Posts Generator</h1>
                <p>
                    Select a sector to view formatted tender posts ready to copy
                    and paste
                </p>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label for="sectorSelect">Select Sector:</label>
                    <select id="sectorSelect">
                        <option value="">-- Choose a sector --</option>
                        <option value="healthcare">🏥 Healthcare</option>
                        <option value="recruitment">👥 Recruitment</option>
                        <option value="construction">
                            🏗️ Construction Work
                        </option>
                        <option value="waste">♻️ Waste Management</option>
                        <option value="gas">🔥 Gas Servicing</option>
                        <option value="fire">🚒 Fire Safety</option>
                        <option value="it">💻 IT</option>
                        <option value="grounds">🌳 Grounds Maintenance</option>
                        <option value="electrical">
                            ⚡ Electrical Services
                        </option>
                        <option value="education">📚 Education</option>
                        <option value="me">🔧 M&E</option>
                        <option value="cleaning">🧹 Cleaning</option>
                        <option value="architect">📐 Architect</option>
                        <option value="civileng">🏗️ Civil Engineering</option>
                        <option value="catering">🍽️ Catering</option>
                        <option value="security">🔒 Security</option>
                        <option value="facilities">
                            🏢 Facilities Management
                        </option>
                        <option value="pest">🐛 Pest Control</option>
                    </select>
                </div>
                <div class="stats">
                    <div class="stat">
                        <span class="stat-number" id="totalPosts">0</span>
                        <span class="stat-label">Posts Ready</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" id="filteredOut">0</span>
                        <span class="stat-label">Filtered (No Value)</span>
                    </div>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading posts...</p>
            </div>
            <div class="empty-state" id="emptyState">
                <h3>Select a sector to get started</h3>
                <p>
                    Choose a sector from the dropdown above to view
                    LinkedIn-ready tender posts
                </p>
            </div>
            <div class="posts-container" id="postsContainer"></div>
        </div>

        <script>
            // ---------------------------------------------------------------------------
            // LIVE API RETURNS EXACTLY THIS SHAPE (confirmed):
            // {
            //   "sector": "Security",
            //   "posts": [
            //     {
            //       "id": "008560-2026",
            //       "title": "Security Services to the Museums Security Consortium",
            //       "description": "Security tender invites for the Natural History Museum...",
            //       "status": "planned",
            //       "value": "85829691.00",
            //       "location": "",
            //       "buyer_name": "Victoria and Albert Museum",
            //       "submission_deadline": "",
            //       "url": "https://www.find-tender.service.gov.uk/Notice/008560-2026",
            //       "sector": "Security"
            //     }
            //   ],
            //   "total": 1
            // }
            // ---------------------------------------------------------------------------

            var TEAM_MEMBERS = [
                "James Wignall",
                "Stacey Crawford",
                "Mike Baron",
                "Matt Burton",
            ];

            var HOOK_LINES = [
                "This is a big one – worth keeping an eye on.",
                "One to watch – get in early if this is in your wheelhouse.",
                "This could be a great opportunity – time to get preparing!",
                "A strong one just dropped – make sure you don't miss it.",
                "This is worth your attention – act fast.",
                "Exciting opportunity just came through – have a look below.",
                "Another solid tender just landed – could be right up your street.",
                "This one's just been posted – worth a closer look.",
            ];

            var CTA_VARIATIONS = [
                function (m) {
                    return (
                        "Contact " +
                        m[0] +
                        ", " +
                        m[1] +
                        " or " +
                        m[2] +
                        " to discuss how Bid Writing Service can support (or take the lead!) in preparing for this tender opportunity."
                    );
                },
                function (m) {
                    return (
                        "If this one's on your radar, reach out to " +
                        m[0] +
                        " or " +
                        m[1] +
                        " – the team at Bid Writing Service would love to help you put together a winning bid."
                    );
                },
                function (m) {
                    return (
                        "Thinking about going for this? " +
                        m[0] +
                        ", " +
                        m[1] +
                        " and " +
                        m[2] +
                        " are on hand at Bid Writing Service to help you get ahead of the competition."
                    );
                },
                function (m) {
                    return (
                        "Don't sleep on this one. Contact " +
                        m[0] +
                        " or " +
                        m[1] +
                        " at Bid Writing Service to talk through how we can help you win."
                    );
                },
                function (m) {
                    return (
                        "Want to make sure you're in the running? Get in touch with " +
                        m[0] +
                        ", " +
                        m[1] +
                        " or " +
                        m[2] +
                        " – Bid Writing Service can help you put together a standout submission."
                    );
                },
            ];

            function pickRandom(arr) {
                return arr[Math.floor(Math.random() * arr.length)];
            }

            function pickRandomMembers(count) {
                var shuffled = TEAM_MEMBERS.slice().sort(function () {
                    return 0.5 - Math.random();
                });
                return shuffled.slice(0, count || 3);
            }

            // ---------------------------------------------------------------------------
            // VALUE: tender.value is "85829691.00" or ""
            // ---------------------------------------------------------------------------
            function hasValue(tender) {
                var raw = String(tender.value || "").trim();
                if (raw === "" || raw === "0" || raw === "0.00") return false;
                var num = parseFloat(raw);
                return !isNaN(num) && num > 0;
            }

            function formatValue(tender) {
                var num = parseFloat(String(tender.value || "0").trim());
                if (isNaN(num) || num === 0) return "";
                if (num >= 1000000)
                    return (
                        "£" + (num / 1000000).toFixed(1) + " million (inc. VAT)"
                    );
                if (num >= 1000)
                    return "£" + (num / 1000).toFixed(0) + "k (inc. VAT)";
                return "£" + num.toLocaleString() + " (inc. VAT)";
            }

            // ---------------------------------------------------------------------------
            // LOCATION: tender.location is often "". Fall back to tender.buyer_name then "UK"
            // ---------------------------------------------------------------------------
            function getLocation(tender) {
                if (tender.location && tender.location.trim() !== "")
                    return tender.location.trim();
                if (tender.buyer_name && tender.buyer_name.trim() !== "")
                    return tender.buyer_name.trim();
                return "UK";
            }

            // ---------------------------------------------------------------------------
            // ALERT TYPE: checks tender.status + tender.description for planned keywords
            // ---------------------------------------------------------------------------
            function getAlertType(tender) {
                var combined = (
                    (tender.status || "") +
                    " " +
                    (tender.title || "") +
                    " " +
                    (tender.description || "")
                ).toLowerCase();

                var keywords = [
                    "planned",
                    "planning",
                    "prior information",
                    "pin",
                    "pre-market",
                    "pre market",
                    "preliminary",
                    "market engagement",
                    "advance notice",
                    "upcoming",
                    "future",
                    "anticipated",
                    "not a call for competition",
                ];

                for (var i = 0; i < keywords.length; i++) {
                    if (combined.indexOf(keywords[i]) !== -1) return "INCOMING";
                }
                return "NEW";
            }

            // ---------------------------------------------------------------------------
            // SUMMARY: trim tender.description to ~250 chars at a sentence boundary
            // ---------------------------------------------------------------------------
            function getSummary(tender) {
                var desc = (tender.description || "")
                    .replace(/\n+/g, " ")
                    .replace(/\s+/g, " ")
                    .trim();
                if (desc.length <= 250) return desc;
                var cut = desc.substring(0, 250);
                var lastDot = cut.lastIndexOf(".");
                if (lastDot > 150) return cut.substring(0, lastDot + 1) + "...";
                return cut + "...";
            }

            // ---------------------------------------------------------------------------
            // BUILD POST
            // ---------------------------------------------------------------------------
            function buildPost(tender) {
                var alertType = getAlertType(tender);
                var hook = pickRandom(HOOK_LINES);
                var members = pickRandomMembers(3);
                var cta = pickRandom(CTA_VARIATIONS)(members);
                var value = formatValue(tender);
                var location = getLocation(tender);
                var summary = getSummary(tender);
                var sectorTag = (tender.sector || "").replace(
                    /[^a-zA-Z0-9]/g,
                    "",
                );

                // tender.submission_deadline is "" or a formatted date string
                var deadline = (tender.submission_deadline || "").trim();
                var deadlineLabel =
                    alertType === "INCOMING"
                        ? "Tender Notice Expected"
                        : "Submission Deadline";

                var post = "";
                post +=
                    "🚨 " +
                    alertType +
                    " TENDER ALERT – " +
                    tender.title +
                    " 🚨\n\n";
                post += hook + "\n\n";
                post += summary + "\n\n";
                post += "Value: " + value + "\n";
                post += "Location: " + location + "\n";
                if (deadline !== "") {
                    post += deadlineLabel + ": " + deadline + "\n";
                }
                post += "\n" + tender.url + "\n\n";
                post += cta + "\n\n";
                post += "#Tenders #" + sectorTag + " #BidWriting #Procurement";

                return { text: post, alertType: alertType, members: members };
            }

            // ---------------------------------------------------------------------------
            // UI
            // ---------------------------------------------------------------------------
            var sectorSelect = document.getElementById("sectorSelect");
            var loading = document.getElementById("loading");
            var emptyState = document.getElementById("emptyState");
            var postsContainer = document.getElementById("postsContainer");
            var totalPostsEl = document.getElementById("totalPosts");
            var filteredOutEl = document.getElementById("filteredOut");

            emptyState.classList.add("show");

            sectorSelect.addEventListener("change", function () {
                var sector = sectorSelect.value;
                if (!sector) {
                    postsContainer.classList.remove("show");
                    emptyState.classList.add("show");
                    loading.classList.remove("show");
                    return;
                }

                loading.classList.add("show");
                postsContainer.classList.remove("show");
                emptyState.classList.remove("show");

                fetch("/api/linkedin-posts/" + sector)
                    .then(function (res) {
                        return res.json();
                    })
                    .then(function (data) {
                        loading.classList.remove("show");

                        if (!data.posts || data.posts.length === 0) {
                            showEmpty(
                                "No tenders found for " +
                                    (data.sector || sector),
                                "There are currently no tenders in this sector.",
                            );
                            return;
                        }

                        // Filter: only keep tenders with a real numeric value
                        var withValue = [];
                        var withoutValue = [];
                        for (var i = 0; i < data.posts.length; i++) {
                            if (hasValue(data.posts[i])) {
                                withValue.push(data.posts[i]);
                            } else {
                                withoutValue.push(data.posts[i]);
                            }
                        }

                        totalPostsEl.textContent = withValue.length;
                        filteredOutEl.textContent = withoutValue.length;

                        if (withValue.length === 0) {
                            showEmpty(
                                "No posts with a contract value for " +
                                    (data.sector || sector),
                                "All tenders in this sector currently have no confirmed value so they've been filtered out.",
                            );
                            return;
                        }

                        renderPosts(withValue, data.sector || sector);
                        postsContainer.classList.add("show");
                    })
                    .catch(function (err) {
                        loading.classList.remove("show");
                        showEmpty("Error loading posts", err.message);
                    });
            });

            function showEmpty(title, msg) {
                emptyState.querySelector("h3").textContent = title;
                emptyState.querySelector("p").textContent = msg;
                emptyState.classList.add("show");
                postsContainer.classList.remove("show");
            }

            function renderPosts(tenders, sectorName) {
                postsContainer.innerHTML = "";

                for (var i = 0; i < tenders.length; i++) {
                    var built = buildPost(tenders[i]);
                    var card = document.createElement("div");
                    card.className = "post-card";

                    card.innerHTML =
                        '<div class="post-header">' +
                        '<div class="post-header-left">' +
                        '<span class="alert-badge ' +
                        built.alertType.toLowerCase() +
                        '">' +
                        built.alertType +
                        "</span>" +
                        '<span class="post-sector">' +
                        sectorName +
                        "</span>" +
                        "</div>" +
                        '<span class="post-number">Post ' +
                        (i + 1) +
                        " of " +
                        tenders.length +
                        "</span>" +
                        "</div>" +
                        '<div class="post-body">' +
                        '<div class="post-text" id="posttext-' +
                        i +
                        '">' +
                        escapeHtml(built.text) +
                        "</div>" +
                        '<div class="post-actions">' +
                        '<button class="btn btn-copy" data-index="' +
                        i +
                        '" onclick="copyPost(' +
                        i +
                        ')">📋 Copy to Clipboard</button>' +
                        '<button class="btn btn-link" onclick="window.open(\'' +
                        tenders[i].url +
                        "', '_blank')\">🔗 View Tender</button>" +
                        "</div>" +
                        '<div class="team-pill">💡 <strong>Team:</strong> ' +
                        built.members.join(", ") +
                        "</div>" +
                        "</div>";

                    postsContainer.appendChild(card);
                }
            }

            function copyPost(index) {
                var el = document.getElementById("posttext-" + index);
                var btn = document.querySelector(
                    'button[data-index="' + index + '"]',
                );

                navigator.clipboard.writeText(el.textContent).then(function () {
                    btn.innerHTML = "✅ Copied!";
                    btn.classList.add("copied");
                    setTimeout(function () {
                        btn.innerHTML = "📋 Copy to Clipboard";
                        btn.classList.remove("copied");
                    }, 2000);
                });
            }

            function escapeHtml(str) {
                var d = document.createElement("div");
                d.textContent = str;
                return d.innerHTML;
            }
        </script>
    </body>
</html>
