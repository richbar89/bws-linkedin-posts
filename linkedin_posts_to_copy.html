<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LinkedIn Posts Generator - Bid Writing Service</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                padding: 20px;
            }

            .container {
                max-width: 1200px;
                margin: 0 auto;
            }

            .header {
                background: white;
                padding: 30px;
                border-radius: 15px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                margin-bottom: 30px;
                text-align: center;
            }
            .header h1 {
                color: #333;
                font-size: 32px;
                margin-bottom: 8px;
            }
            .header p {
                color: #666;
                font-size: 16px;
            }

            .controls {
                background: white;
                padding: 25px;
                border-radius: 15px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                margin-bottom: 30px;
            }
            .control-group {
                display: flex;
                gap: 20px;
                align-items: center;
                flex-wrap: wrap;
            }
            .control-group label {
                font-weight: 600;
                color: #333;
                font-size: 16px;
            }
            .control-group select {
                flex: 1;
                min-width: 250px;
                padding: 12px 20px;
                border: 2px solid #e0e0e0;
                border-radius: 8px;
                font-size: 16px;
                background: white;
                cursor: pointer;
                transition: border-color 0.3s;
            }
            .control-group select:hover,
            .control-group select:focus {
                border-color: #667eea;
                outline: none;
            }

            .stats {
                display: flex;
                gap: 20px;
                margin-top: 15px;
                flex-wrap: wrap;
            }
            .stat {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                text-align: center;
                flex: 1;
                min-width: 150px;
            }
            .stat-number {
                font-size: 32px;
                font-weight: bold;
                display: block;
            }
            .stat-label {
                font-size: 14px;
                opacity: 0.9;
                margin-top: 5px;
            }

            /* --- LOADING & EMPTY STATES --- */
            .loading,
            .empty-state {
                background: white;
                padding: 60px;
                border-radius: 15px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                text-align: center;
                display: none;
            }
            .loading.show,
            .empty-state.show {
                display: block;
            }
            .spinner {
                border: 4px solid #f3f3f3;
                border-top: 4px solid #667eea;
                border-radius: 50%;
                width: 50px;
                height: 50px;
                animation: spin 1s linear infinite;
                margin: 0 auto 20px;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .empty-state h3 {
                color: #333;
                font-size: 24px;
                margin-bottom: 10px;
            }
            .empty-state p {
                color: #666;
                font-size: 16px;
            }

            /* --- POST CARDS --- */
            .posts-container {
                display: none;
            }
            .posts-container.show {
                display: block;
            }

            .post-card {
                background: white;
                border-radius: 15px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                margin-bottom: 25px;
                overflow: hidden;
                transition:
                    transform 0.3s,
                    box-shadow 0.3s;
            }
            .post-card:hover {
                transform: translateY(-3px);
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            }

            /* Card header bar */
            .post-header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 18px 25px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .post-header-left {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .alert-badge {
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.5px;
                padding: 4px 10px;
                border-radius: 20px;
                text-transform: uppercase;
            }
            .alert-badge.new {
                background: #f59e0b;
                color: #fff;
            }
            .alert-badge.incoming {
                background: #10b981;
                color: #fff;
            }
            .post-sector {
                font-size: 16px;
                font-weight: 600;
            }
            .post-number {
                font-size: 13px;
                opacity: 0.8;
            }

            /* The actual post text — styled to look like a LinkedIn post */
            .post-body {
                padding: 25px;
            }
            .post-text {
                font-family: "Segoe UI", Arial, sans-serif;
                font-size: 15px;
                line-height: 1.85;
                color: #1a1a2e;
                white-space: pre-wrap;
                background: #f8f9fa;
                padding: 22px 24px;
                border-radius: 10px;
                border-left: 4px solid #667eea;
                margin-bottom: 18px;
            }

            /* Buttons */
            .post-actions {
                display: flex;
                gap: 12px;
            }
            .btn {
                padding: 12px 22px;
                border: none;
                border-radius: 8px;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .btn-copy {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                flex: 1;
                justify-content: center;
            }
            .btn-copy:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            }
            .btn-copy.copied {
                background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            }
            .btn-link {
                background: #f3f4f6;
                color: #667eea;
            }
            .btn-link:hover {
                background: #e5e7eb;
            }

            /* Team member info pill */
            .team-pill {
                margin-top: 14px;
                padding: 10px 14px;
                background: #f0f9ff;
                border-radius: 6px;
                font-size: 13px;
                color: #0369a1;
            }

            /* Back link */
            .back-link {
                display: inline-block;
                background: white;
                color: #667eea;
                padding: 12px 24px;
                border-radius: 8px;
                text-decoration: none;
                font-weight: 600;
                margin-bottom: 20px;
                transition: all 0.3s;
            }
            .back-link:hover {
                background: #f3f4f6;
                transform: translateY(-2px);
            }

            @media (max-width: 768px) {
                .header h1 {
                    font-size: 24px;
                }
                .control-group {
                    flex-direction: column;
                    align-items: stretch;
                }
                .control-group select {
                    min-width: 100%;
                }
                .stats {
                    flex-direction: column;
                }
                .post-header {
                    flex-direction: column;
                    gap: 8px;
                    align-items: flex-start;
                }
                .post-actions {
                    flex-direction: column;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <a href="/" class="back-link">← Back to Tender Scanner</a>

            <div class="header">
                <h1>📱 LinkedIn Posts Generator</h1>
                <p>
                    Select a sector to view formatted tender posts ready to copy
                    and paste
                </p>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label for="sectorSelect">Select Sector:</label>
                    <select id="sectorSelect">
                        <option value="">-- Choose a sector --</option>
                        <option value="healthcare">🏥 Healthcare</option>
                        <option value="recruitment">👥 Recruitment</option>
                        <option value="construction">
                            🏗️ Construction Work
                        </option>
                        <option value="waste">♻️ Waste Management</option>
                        <option value="gas">🔥 Gas Servicing</option>
                        <option value="fire">🚒 Fire Safety</option>
                        <option value="it">💻 IT</option>
                        <option value="grounds">🌳 Grounds Maintenance</option>
                        <option value="electrical">
                            ⚡ Electrical Services
                        </option>
                        <option value="education">📚 Education</option>
                        <option value="me">🔧 M&E</option>
                        <option value="cleaning">🧹 Cleaning</option>
                        <option value="architect">📐 Architect</option>
                        <option value="civileng">🏗️ Civil Engineering</option>
                        <option value="catering">🍽️ Catering</option>
                        <option value="security">🔒 Security</option>
                        <option value="facilities">
                            🏢 Facilities Management
                        </option>
                        <option value="pest">🐛 Pest Control</option>
                    </select>
                </div>
                <div class="stats">
                    <div class="stat">
                        <span class="stat-number" id="totalPosts">0</span>
                        <span class="stat-label">Posts Ready</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" id="filteredOut">0</span>
                        <span class="stat-label">Filtered (No Value)</span>
                    </div>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading posts...</p>
            </div>
            <div class="empty-state" id="emptyState">
                <h3>Select a sector to get started</h3>
                <p>
                    Choose a sector from the dropdown above to view
                    LinkedIn-ready tender posts
                </p>
            </div>
            <div class="posts-container" id="postsContainer"></div>
        </div>

        <script>
            // ---------------------------------------------------------------------------
            // POST FORMATTING ENGINE (client-side mirror of generate-manual-posts.js)
            // This runs in the browser so we can format posts exactly how we want them
            // displayed AND copied. The server just provides raw tender data.
            // ---------------------------------------------------------------------------

            const TEAM_MEMBERS = [
                "James Wignall",
                "Stacey Crawford",
                "Mike Baron",
                "Matt Burton",
            ];

            const HOOK_LINES = [
                "This is a big one – worth keeping an eye on.",
                "One to watch – get in early if this is in your wheelhouse.",
                "This could be a great opportunity – time to get preparing!",
                "A strong one just dropped – make sure you don't miss it.",
                "This is worth your attention – act fast.",
                "Exciting opportunity just came through – have a look below.",
                "Another solid tender just landed – could be right up your street.",
                "This one's just been posted – worth a closer look.",
            ];

            const CTA_VARIATIONS = [
                (m) =>
                    `Contact ${m[0]}, ${m[1]} or ${m[2]} to discuss how Bid Writing Service can support (or take the lead!) in preparing for this tender opportunity.`,
                (m) =>
                    `If this one's on your radar, reach out to ${m[0]} or ${m[1]} – the team at Bid Writing Service would love to help you put together a winning bid.`,
                (m) =>
                    `Thinking about going for this? ${m[0]}, ${m[1]} and ${m[2]} are on hand at Bid Writing Service to help you get ahead of the competition.`,
                (m) =>
                    `Don't sleep on this one. Contact ${m[0]} or ${m[1]} at Bid Writing Service to talk through how we can help you win.`,
                (m) =>
                    `Want to make sure you're in the running? Get in touch with ${m[0]}, ${m[1]} or ${m[2]} – Bid Writing Service can help you put together a standout submission.`,
            ];

            function pickRandom(arr) {
                return arr[Math.floor(Math.random() * arr.length)];
            }

            function pickRandomMembers(n = 3) {
                return [...TEAM_MEMBERS]
                    .sort(() => 0.5 - Math.random())
                    .slice(0, n);
            }

            function getAlertType(tender) {
                const combined =
                    `${tender.status || ""} ${tender.title || ""} ${tender.description || ""}`.toLowerCase();
                const plannedKw = [
                    "planned",
                    "planning",
                    "prior information",
                    "pin",
                    "pre-market",
                    "pre market",
                    "preliminary",
                    "market engagement",
                    "pmen",
                    "advance notice",
                    "upcoming",
                    "future",
                    "anticipated",
                ];
                for (const kw of plannedKw) {
                    if (combined.includes(kw)) return "INCOMING";
                }
                return "NEW";
            }

            function hasValue(tender) {
                const val = (tender.value || tender.contract_value || "")
                    .toString()
                    .trim()
                    .toLowerCase();
                if (
                    !val ||
                    val === "tbc" ||
                    val === "value tbc" ||
                    val === "0" ||
                    val === "£0"
                )
                    return false;
                return true;
            }

            function formatValue(tender) {
                let val = (tender.value || tender.contract_value || "")
                    .toString()
                    .trim();
                if (!val.startsWith("£")) val = "£" + val;
                return val;
            }

            function formatPost(tender, sectorName) {
                const alertType = getAlertType(tender);
                const hook = pickRandom(HOOK_LINES);
                const members = pickRandomMembers(3);
                const cta = pickRandom(CTA_VARIATIONS)(members);

                let title = (tender.title || "Untitled Tender").trim();
                if (title.length > 120) title = title.substring(0, 117) + "...";

                const body = (tender.description || "").trim();
                const location = (tender.location || "").trim();
                const value = formatValue(tender);
                const url = (tender.url || tender.tender_url || "").trim();
                const sector = (tender.sector || sectorName || "").trim();
                const sectorTag = sector.replace(/[^a-zA-Z0-9]/g, "");

                // Figure out deadline label
                let deadlineLabel = "",
                    deadlineValue = "";
                if (alertType === "INCOMING") {
                    const exp =
                        tender.tender_notice_expected ||
                        tender.expected_date ||
                        "";
                    if (exp) {
                        deadlineLabel = "Tender Notice Expected";
                        deadlineValue = exp;
                    }
                } else {
                    const dl =
                        tender.submission_deadline || tender.deadline || "";
                    if (dl) {
                        deadlineLabel = "Submission Deadline";
                        deadlineValue = dl;
                    }
                }

                // Build the plain-text post (this is what gets copied to clipboard)
                let post = `🚨 ${alertType} TENDER ALERT – ${title} 🚨\n\n`;
                post += `${hook}\n\n`;
                if (body) post += `${body}\n\n`;

                post += `Value: ${value}\n`;
                if (location) post += `Location: ${location}\n`;
                if (deadlineLabel && deadlineValue)
                    post += `${deadlineLabel}: ${deadlineValue}\n`;
                post += `\n`;
                if (url) post += `${url}\n\n`;
                post += `${cta}\n\n`;
                post += `#Tenders #${sectorTag} #BidWriting #Procurement`;

                return {
                    post,
                    alertType,
                    title,
                    hook,
                    body,
                    value,
                    location,
                    deadlineLabel,
                    deadlineValue,
                    url,
                    cta,
                    sectorTag,
                    members,
                };
            }

            // ---------------------------------------------------------------------------
            // UI LAYER
            // ---------------------------------------------------------------------------
            const sectorSelect = document.getElementById("sectorSelect");
            const loading = document.getElementById("loading");
            const emptyState = document.getElementById("emptyState");
            const postsContainer = document.getElementById("postsContainer");
            const totalPostsEl = document.getElementById("totalPosts");
            const filteredOutEl = document.getElementById("filteredOut");

            emptyState.classList.add("show");

            sectorSelect.addEventListener("change", async (e) => {
                const sector = e.target.value;
                if (!sector) {
                    postsContainer.classList.remove("show");
                    emptyState.classList.add("show");
                    loading.classList.remove("show");
                    return;
                }

                loading.classList.add("show");
                postsContainer.classList.remove("show");
                emptyState.classList.remove("show");

                try {
                    const response = await fetch(
                        `/api/linkedin-posts/${sector}`,
                    );
                    const data = await response.json();
                    loading.classList.remove("show");

                    if (!data.posts || data.posts.length === 0) {
                        emptyState.querySelector("h3").textContent =
                            `No posts found for ${data.sector || sector}`;
                        emptyState.querySelector("p").textContent =
                            "There are currently no active tenders in this sector.";
                        emptyState.classList.add("show");
                        return;
                    }

                    // Separate posts: those with value (keep) vs without (filter out)
                    const withValue = data.posts.filter(hasValue);
                    const withoutValue = data.posts.filter((p) => !hasValue(p));

                    totalPostsEl.textContent = withValue.length;
                    filteredOutEl.textContent = withoutValue.length;

                    if (withValue.length === 0) {
                        emptyState.querySelector("h3").textContent =
                            `No posts with contract value for ${data.sector || sector}`;
                        emptyState.querySelector("p").textContent =
                            "All tenders in this sector currently have no confirmed value. They've been filtered out.";
                        emptyState.classList.add("show");
                        return;
                    }

                    renderPosts(withValue, data.sector || sector);
                    postsContainer.classList.add("show");
                } catch (error) {
                    console.error("Error:", error);
                    loading.classList.remove("show");
                    emptyState.querySelector("h3").textContent =
                        "Error loading posts";
                    emptyState.querySelector("p").textContent =
                        "Please try again or check the console.";
                    emptyState.classList.add("show");
                }
            });

            function renderPosts(tenders, sectorName) {
                postsContainer.innerHTML = "";

                tenders.forEach((tender, i) => {
                    const formatted = formatPost(tender, sectorName);
                    const card = document.createElement("div");
                    card.className = "post-card";

                    card.innerHTML = `
            <div class="post-header">
                <div class="post-header-left">
                    <span class="alert-badge ${formatted.alertType.toLowerCase()}">${formatted.alertType}</span>
                    <span class="post-sector">${sectorName}</span>
                </div>
                <span class="post-number">Post ${i + 1} of ${tenders.length}</span>
            </div>
            <div class="post-body">
                <div class="post-text" id="posttext-${i}">${escapeHtml(formatted.post)}</div>
                <div class="post-actions">
                    <button class="btn btn-copy" data-index="${i}" onclick="copyPost(${i})">📋 Copy to Clipboard</button>
                    ${formatted.url ? `<button class="btn btn-link" onclick="window.open('${formatted.url}', '_blank')">🔗 View Tender</button>` : ""}
                </div>
                <div class="team-pill">💡 <strong>Team:</strong> ${formatted.members.join(", ")}</div>
            </div>
        `;

                    postsContainer.appendChild(card);
                });
            }

            function copyPost(index) {
                const el = document.getElementById(`posttext-${index}`);
                const text = el.textContent;

                navigator.clipboard.writeText(text).then(() => {
                    const btn = document.querySelector(
                        `button[data-index="${index}"]`,
                    );
                    btn.innerHTML = "✅ Copied!";
                    btn.classList.add("copied");
                    setTimeout(() => {
                        btn.innerHTML = "📋 Copy to Clipboard";
                        btn.classList.remove("copied");
                    }, 2000);
                });
            }

            function escapeHtml(text) {
                const div = document.createElement("div");
                div.textContent = text;
                return div.innerHTML;
            }
        </script>
    </body>
</html>
